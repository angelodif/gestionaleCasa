<div class="meal-planner-container">
  <div class="top-bar">
    <button mat-stroked-button (click)="goBack()">
      <mat-icon>dashboard</mat-icon> Dashboard
    </button>
  </div>
  <div class="week-navigation">
    <button mat-icon-button (click)="changeWeek(-1)"><mat-icon>chevron_left</mat-icon></button>
    <div class="title-container">
      <h1>Menù Settimanale</h1>
      <p>{{ weekRangeLabel }}</p>
    </div>
    <button mat-icon-button (click)="changeWeek(1)"><mat-icon>chevron_right</mat-icon></button>
  </div>

  <div class="days-grid">
    <mat-card *ngFor="let day of weekDaysData" class="day-card" [class.is-today]="isToday(day.date)">
      <mat-card-header>
        <mat-card-title>{{ day.name }}</mat-card-title>
        <mat-card-subtitle>{{ day.date | date:'dd MMMM':'':'it-IT' }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content *ngIf="allDaysPlans[day.name]">
        <div class="meal-group lunch">
          <div class="meal-header">
            <mat-icon color="primary">light_mode</mat-icon>
            <span>PRANZO</span>
            <button mat-icon-button (click)="toggleSplit(day.name, 'lunch')">
              <mat-icon [color]="isSplit[day.name].lunch ? 'warn' : ''">{{ isSplit[day.name].lunch ? 'call_split' : 'person' }}</mat-icon>
            </button>
          </div>
          <div class="inputs-container">
            <div class="user-controls">
              <button mat-icon-button class="eat-out-btn-top" [color]="allDaysPlans[day.name].lunch.angelo.isOut ? 'accent' : 'primary'" (click)="toggleOut(day.name, 'lunch', 'angelo')">
                <mat-icon>{{ allDaysPlans[day.name].lunch.angelo.isOut ? 'storefront' : 'restaurant' }}</mat-icon>
                <span class="btn-label">{{ allDaysPlans[day.name].lunch.angelo.isOut ? 'Fuori' : 'A casa' }}</span>
              </button>
              <div class="user-badge" *ngIf="isSplit[day.name].lunch">A</div>
            </div>
            <div class="input-row">
                <mat-form-field appearance="outline">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].lunch.angelo.main" (ngModelChange)="syncMeals(day.name, 'lunch')" [placeholder]="allDaysPlans[day.name].lunch.angelo.isOut ? 'Nome Locale' : 'Portata'">
                  <button matSuffix *ngIf="!allDaysPlans[day.name].lunch.angelo.isOut" mat-icon-button color="primary" (click)="addToList(allDaysPlans[day.name].lunch.angelo.main)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
                <mat-form-field appearance="outline" *ngIf="!allDaysPlans[day.name].lunch.angelo.isOut">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].lunch.angelo.details" (ngModelChange)="syncMeals(day.name, 'lunch')" placeholder="Condimento">
                  <button matSuffix mat-icon-button color="primary" (click)="addToList(allDaysPlans[day.name].lunch.angelo.details)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
            </div>
            <div class="user-controls animate-split" *ngIf="isSplit[day.name].lunch">
              <button mat-icon-button class="eat-out-btn-top" [color]="allDaysPlans[day.name].lunch.daiana.isOut ? 'accent' : 'primary'" (click)="toggleOut(day.name, 'lunch', 'daiana')">
                <mat-icon>{{ allDaysPlans[day.name].lunch.daiana.isOut ? 'storefront' : 'restaurant' }}</mat-icon>
                <span class="btn-label">{{ allDaysPlans[day.name].lunch.daiana.isOut ? 'Fuori' : 'A casa' }}</span>
              </button>
              <div class="user-badge pink">D</div>
            </div>
            <div class="input-row animate-split" *ngIf="isSplit[day.name].lunch">
                <mat-form-field appearance="outline">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].lunch.daiana.main"
                    (ngModelChange)="save(day.name)" [placeholder]="allDaysPlans[day.name].lunch.daiana.isOut ? 'Nome Locale D.' : 'Portata D.'">
                  <button matSuffix *ngIf="!allDaysPlans[day.name].lunch.daiana.isOut" mat-icon-button color="primary"
                    (click)="addToList(allDaysPlans[day.name].lunch.daiana.main)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
                <mat-form-field appearance="outline" *ngIf="!allDaysPlans[day.name].lunch.daiana.isOut">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].lunch.daiana.details"
                    (ngModelChange)="save(day.name)" placeholder="Condimento D.">
                  <button matSuffix mat-icon-button color="primary"
                    (click)="addToList(allDaysPlans[day.name].lunch.daiana.details)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
            </div>
          </div>
        </div>

        <mat-divider></mat-divider>

        <div class="meal-group dinner">
          <div class="meal-header">
            <mat-icon color="accent">dark_mode</mat-icon>
            <span>CENA</span>
            <button mat-icon-button (click)="toggleSplit(day.name, 'dinner')">
              <mat-icon [color]="isSplit[day.name].dinner ? 'warn' : ''">{{ isSplit[day.name].dinner ? 'call_split' : 'person' }}</mat-icon>
            </button>
          </div>
          <div class="inputs-container">
            <div class="user-controls">
              <button mat-icon-button class="eat-out-btn-top" [color]="allDaysPlans[day.name].dinner.angelo.isOut ? 'accent' : 'primary'" (click)="toggleOut(day.name, 'dinner', 'angelo')">
                <mat-icon>{{ allDaysPlans[day.name].dinner.angelo.isOut ? 'storefront' : 'restaurant' }}</mat-icon>
                <span class="btn-label">{{ allDaysPlans[day.name].dinner.angelo.isOut ? 'Fuori' : 'A casa' }}</span>
              </button>
              <div class="user-badge" *ngIf="isSplit[day.name].dinner">A</div>
            </div>
            <div class="input-row">
                <mat-form-field appearance="outline">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].dinner.angelo.main" (ngModelChange)="syncMeals(day.name, 'dinner')" [placeholder]="allDaysPlans[day.name].dinner.angelo.isOut ? 'Nome Locale' : 'Portata'">
                  <button matSuffix *ngIf="!allDaysPlans[day.name].dinner.angelo.isOut" mat-icon-button color="primary" (click)="addToList(allDaysPlans[day.name].dinner.angelo.main)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
                <mat-form-field appearance="outline" *ngIf="!allDaysPlans[day.name].dinner.angelo.isOut">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].dinner.angelo.details" (ngModelChange)="syncMeals(day.name, 'dinner')" placeholder="Contorno">
                  <button matSuffix mat-icon-button color="primary" (click)="addToList(allDaysPlans[day.name].dinner.angelo.details)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
            </div>
            <div class="user-controls animate-split" *ngIf="isSplit[day.name].dinner">
              <button mat-icon-button class="eat-out-btn-top" [color]="allDaysPlans[day.name].dinner.daiana.isOut ? 'accent' : 'primary'" (click)="toggleOut(day.name, 'dinner', 'daiana')">
                <mat-icon>{{ allDaysPlans[day.name].dinner.daiana.isOut ? 'storefront' : 'restaurant' }}</mat-icon>
                <span class="btn-label">{{ allDaysPlans[day.name].dinner.daiana.isOut ? 'Fuori' : 'A casa' }}</span>
              </button>
              <div class="user-badge pink">D</div>
            </div>
            <div class="input-row animate-split" *ngIf="isSplit[day.name].dinner">
                <mat-form-field appearance="outline">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].dinner.daiana.main"
                    (ngModelChange)="save(day.name)" [placeholder]="allDaysPlans[day.name].dinner.daiana.isOut ? 'Nome Locale D.' : 'Portata D.'">
                  <button matSuffix *ngIf="!allDaysPlans[day.name].dinner.daiana.isOut" mat-icon-button color="primary"
                    (click)="addToList(allDaysPlans[day.name].dinner.daiana.main)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
                <mat-form-field appearance="outline" *ngIf="!allDaysPlans[day.name].dinner.daiana.isOut">
                  <input matInput [(ngModel)]="allDaysPlans[day.name].dinner.daiana.details"
                    (ngModelChange)="save(day.name)" placeholder="Contorno D.">
                  <button matSuffix mat-icon-button color="primary"
                    (click)="addToList(allDaysPlans[day.name].dinner.daiana.details)">
                    <mat-icon>add_shopping_cart</mat-icon>
                  </button>
                </mat-form-field>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
