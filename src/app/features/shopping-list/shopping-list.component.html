<div class="shopping-container">
  <div class="top-bar">
    <button mat-stroked-button (click)="goBack()" *ngIf="!activeStoreModeShop">
      <mat-icon>dashboard</mat-icon> Dashboard
    </button>
    <button mat-stroked-button (click)="exitStoreMode()" class="mode-toggle" *ngIf="activeStoreModeShop">
      <mat-icon>arrow_back</mat-icon>
      <span class="hide-mobile">&nbsp;TORNA ALLA GESTIONE</span>
    </button>
  </div>

  <div class="header-section">
    <h1>{{ activeStoreModeShop ? 'Negozio: ' + activeStoreModeShop : 'Lista della Spesa' }}</h1>
    <p *ngIf="activeStoreModeShop">Modalità Negozio: Spunta i prodotti nel carrello</p>
    <p *ngIf="!activeStoreModeShop">Modalità Gestione: Aggiungi/Rimuovi prodotti</p>
  </div>

  <mat-card class="main-card">
    <div class="add-action-container" *ngIf="!activeStoreModeShop">
      <button mat-raised-button color="primary" class="full-width add-btn" (click)="addItem()">
        <mat-icon>add_shopping_cart</mat-icon> NUOVO PRODOTTO
      </button>
    </div>

    <mat-card-content>
      <div class="items-list" *ngIf="groupedItems.length > 0; else noItems">
        <ng-container *ngFor="let group of groupedItems">
          <div class="shop-group" *ngIf="!activeStoreModeShop || activeStoreModeShop === group.shop">
            <h3 class="shop-header">
              <span><mat-icon>store</mat-icon> {{ group.shop }}</span>
              <button mat-stroked-button color="primary" *ngIf="!activeStoreModeShop" (click)="enterStoreMode(group.shop)">
                <mat-icon>storefront</mat-icon> <span class="hide-mobile">VAI AL NEGOZIO</span>
              </button>
            </h3>
            <div class="item-row" *ngFor="let item of group.items" [class.completed]="item.completed">
              
              <ng-container *ngIf="activeStoreModeShop || item.completed; else plainText">
                <mat-checkbox [checked]="item.completed" (change)="toggleItem(item)" color="primary" [disabled]="!activeStoreModeShop">
                  {{ item.text }}
                </mat-checkbox>
              </ng-container>

              <ng-template #plainText>
                <div class="item-text-only" (click)="editItem(item)" style="cursor: pointer; display: flex; align-items: center; justify-content: space-between; overflow: hidden; gap: 8px;">
                  <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ item.text }}</span>
                  <mat-icon style="font-size: 18px; width: 18px; height: 18px; opacity: 0.5; flex-shrink: 0;">edit</mat-icon>
                </div>
              </ng-template>

              <button *ngIf="!activeStoreModeShop" mat-icon-button color="warn" class="del-btn" (click)="deleteItem(item)">
                <mat-icon>delete_outline</mat-icon>
              </button>
            </div>
          </div>
        </ng-container>
      </div>
      <ng-template #noItems>
        <div class="empty-state">
          <mat-icon>shopping_basket</mat-icon>
          <p>La lista della spesa è vuota!</p>
        </div>
      </ng-template>
    </mat-card-content>

    <mat-card-actions *ngIf="items.length > 0 && activeStoreModeShop" class="actions-footer">
      <button mat-raised-button color="primary" class="full-width finish-btn" (click)="finishShopping()">
        <mat-icon>check_circle</mat-icon> FINE SPESA
      </button>
    </mat-card-actions>
  </mat-card>
</div>
